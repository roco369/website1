<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asuka Cosmos - Audio Fix</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050510; -webkit-text-size-adjust: 100%; }
        canvas { display: block; touch-action: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; 
                    flex-direction: column; justify-content: center; align-items: center; 
                    font-family: serif; z-index: 100; transition: opacity 1s; }
        #startScreen { background: radial-gradient(circle, #1a1a3a 0%, #050510 100%); color: white; }
        h1 { font-size: 2.5rem; margin: 0; letter-spacing: 0.3rem; text-shadow: 0 0 15px #FFD700; text-align: center; }
        .btn { margin-top: 30px; padding: 15px 40px; font-size: 1.1rem; background: transparent; color: white; 
               border: 1px solid white; cursor: pointer; transition: 0.3s; font-family: serif; -webkit-appearance: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-family: serif; pointer-events: none; z-index: 10; font-size: 1.2rem; display: none; }
        /* ボタンのデザインを少し押しやすく調整 */
        #audioControl { position: absolute; top: 20px; right: 20px; z-index: 110; background: rgba(0,0,0,0.5); border: 1px solid white; color: white; padding: 10px 15px; font-family: serif; font-size: 0.9rem; border-radius: 5px; cursor: pointer; }
        #endingScreen { background: white; color: #333; display: none; opacity: 0; }
    </style>
</head>
<body>
    <div id="startScreen" class="overlay">
        <h1>飛鳥コスモス</h1>
        <p style="margin-top: 10px; opacity: 0.8;">— 10000の記憶を辿る旅 —</p>
        <button class="btn" id="startBtn">夜をはじめる</button>
    </div>

    <div id="ui">光の記憶: <span id="scoreVal">0</span></div>
    <button id="audioControl">♫ 音声: オフ</button>

    <div id="endingScreen" class="overlay">
        <h2>すべてのひかりが、ひとつに。</h2>
        <button class="btn" style="color:#333; border-color:#333;" onclick="location.reload()">もう一度、新しい夜へ</button>
    </div>

    <canvas id="cosmosCanvas"></canvas>

    <script>
        const canvas = document.getElementById('cosmosCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisp = document.getElementById('scoreVal');
        const startScreen = document.getElementById('startScreen');
        const endingScreen = document.getElementById('endingScreen');
        const uiLayer = document.getElementById('ui');
        const audioBtn = document.getElementById('audioControl');
        const startBtn = document.getElementById('startBtn');

        let width, height, score = 0, slowTime = 0, isPlaying = false, isEnding = false;
        let planets = [], comets = [], particles = [];
        
        let audioCtx = null;
        let bgm = new Audio();
        bgm.loop = true;
        let audioEnabled = false;
        const bgmFiles = ['asuka1.mp3', 'asuka2.mp3', 'asuka3.mp3', 'asuka4.mp3', 'asuka5.mp3'];

        // 共通の音声初期化
        function wakeAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        startBtn.addEventListener('click', () => {
            wakeAudio();
            startGame();
        });

        audioBtn.addEventListener('click', () => {
            wakeAudio();
            toggleAudio();
        });

        function toggleAudio() {
            audioEnabled = !audioEnabled;
            if (audioEnabled) {
                // 停止位置から再生するか、新しく選ぶ
                if (!bgm.src) {
                    const randomBGM = bgmFiles[Math.floor(Math.random() * bgmFiles.length)];
                    bgm.src = randomBGM;
                }
                bgm.play().catch(e => console.log("Play failed"));
                audioBtn.innerText = "♫ 音声: オン";
            } else {
                bgm.pause();
                audioBtn.innerText = "♫ 音声: オフ";
            }
        }

        // 効果音生成（和楽器・クリスタル系）
        function playKira(freq, duration = 0.5, glissando = 1.0) {
            if (!audioEnabled || !audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(freq * glissando, audioCtx.currentTime + duration);
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            planets = [
                { id: 'gold', x: width * 0.5, y: height * 0.55, r: 40, color: '#FFD700', glow: '#FF8C00', cd: 0, maxCd: 0 },
                { id: 'blue', x: width * 0.25, y: height * 0.35, r: 35, color: '#B0E0E6', glow: '#00BFFF', cd: 0, maxCd: 600 },
                { id: 'pink', x: width * 0.75, y: height * 0.35, r: 38, color: '#FFB7C5', glow: '#FF69B4', cd: 0, maxCd: 900 }
            ];
        }

        function startGame() {
            startScreen.style.opacity = 0;
            setTimeout(() => { 
                startScreen.style.display = 'none'; 
                uiLayer.style.display = 'block';
                isPlaying = true; 
                resize(); animate();
