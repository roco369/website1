<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebration Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffb7c5;
            --accent-color: #ff4081;
            --bg-fallback: linear-gradient(135deg, #fff5f7 0%, #f0f4ff 100%);
            --bg-sakura-img: url('お祝いジェネレーター素材/桜吹雪背景.png'); 
            --bg-party-img: url('お祝いジェネレーター素材/パーティー背景.png');
            --bg-sunset-img: url('お祝いジェネレーター素材/夕焼け背景.png');
            --bg-cute-img: url('お祝いジェネレーター素材/さわやか背景.png');
            --bg-sunlight-img: url('お祝いジェネレーター素材/木漏れ日背景.png');
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Kiwi Maru', serif;
            background-color: #fff;
            overflow: hidden;
            color: #333;
        }
        #auto-play-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 200;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: white; padding: 20px;
        }
        #auto-play-btn {
            font-size: 1.5rem; font-weight: bold; font-family: inherit;
            background: linear-gradient(45deg, #ff7eb3, #ff758c);
            color: white; border: none; padding: 20px 40px; border-radius: 60px;
            box-shadow: 0 6px 25px rgba(255, 126, 179, 0.6); 
            cursor: pointer; animation: pulse 1.5s infinite;
        }
        #setup-screen {
            display: flex; flex-direction: column; align-items: center;
            height: 100%; overflow-y: auto; padding: 30px 20px; box-sizing: border-box;
            background: var(--bg-fallback); z-index: 100; position: relative;
        }
        .container { width: 100%; max-width: 400px; background: rgba(255,255,255,0.7); padding: 25px; border-radius: 25px; backdrop-filter: blur(5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { color: var(--accent-color); text-align: center; margin-top: 0; font-size: 1.4rem; }
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #666; }
        input, select, textarea { padding: 12px; border-radius: 12px; border: 2px solid #ffdae0; font-size: 16px; font-family: inherit; background: white; outline: none; }
        .btn-area { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        button { padding: 15px; font-size: 1.1rem; font-weight: bold; font-family: inherit; border-radius: 40px; border: none; cursor: pointer; transition: 0.3s; }
        #start-btn { background: linear-gradient(45deg, #ff7eb3, #ff758c); color: white; box-shadow: 0 4px 15px rgba(255, 126, 179, 0.4); }
        #share-btn { background: white; color: var(--accent-color); border: 2px solid var(--accent-color); font-size: 0.9rem; }
        #celebration-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; background-size: cover; background-position: center;
            overflow: hidden;
        }
        .bg-sakura { background-image: var(--bg-sakura-img); animation: bg-zoom-slow 20s ease-in-out infinite alternate; }
        .bg-party { background-image: var(--bg-party-img); animation: bg-zoom 10s ease-in-out infinite alternate; }
        .bg-sunset { background-image: var(--bg-sunset-img); animation: bg-zoom-slow 25s linear infinite alternate; }
        .bg-cute { background-image: var(--bg-cute-img); animation: bg-shake-slow 18s ease-in-out infinite; }
        .bg-sunlight { background-image: var(--bg-sunlight-img); animation: bg-shake 14s ease-in-out infinite; }
        @keyframes bg-shake { 0%, 100% { transform: scale(1.05) translate(0,0); } 50% { transform: scale(1.07) translate(5px, 5px); } }
        @keyframes bg-shake-slow { 0%, 100% { transform: scale(1.02) translate(0,0); } 50% { transform: scale(1.03) translate(-3px, 2px); } }
        @keyframes bg-zoom { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        @keyframes bg-zoom-slow { 0% { transform: scale(1.05); } 100% { transform: scale(1.15); } }

        /* テキストコンテナ：幅いっぱいに広げてfitTextで調整 */
        #text-container {
            z-index: 10;
            padding: 20px;
            width: 92%;
            max-width: 600px;
            opacity: 1;
        }
        #text-container.animate-in {
            animation: celebrateIn 1.5s ease-out forwards;
        }
        #display-name { 
            font-size: clamp(1.8rem, 8vw, 3rem);
            color: #ff4081; 
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 
                3px 3px 0 #fff, -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff,
                0px 3px 0 #fff,  0px -3px 0 #fff, 3px 0px 0 #fff, -3px 0px 0 #fff;
            animation: text-shine-gold 3s linear infinite, text-glow-strong 2s ease-in-out infinite alternate;
            /* 1行に収める → フォントサイズをJSで調整 */
            white-space: nowrap;
            overflow: hidden;
        }
        #display-msg { 
            font-weight: bold; 
            color: #333; 
            line-height: 1.3;
            animation: text-glow-white 3s ease-in-out infinite alternate;
            /* 自動サイズ調整（JS側で制御） */
            white-space: pre-wrap;
            word-break: break-word;
        }
        @keyframes text-shine-gold {
            0% { color: #ff4081; filter: drop-shadow(0 0 5px #fff); }
            50% { color: #ff80ab; filter: drop-shadow(0 0 20px #fff) brightness(1.2); }
            100% { color: #ff4081; filter: drop-shadow(0 0 5px #fff); }
        }
        @keyframes text-glow-strong {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.05); filter: brightness(1.3) drop-shadow(0 0 25px rgba(255,255,255,1)); }
        }
        @keyframes text-glow-white {
            0% { text-shadow: 0 0 10px rgba(255,255,255,0.6); }
            100% { text-shadow: 0 0 40px rgba(255,255,255,1), 0 0 15px rgba(255,192,203,0.8); }
        }
        @keyframes celebrateIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .particle { position: absolute; pointer-events: none; z-index: 5; background-size: contain; background-repeat: no-repeat; }
        .anim-rise-straight { animation: rise-straight linear infinite; }
        @keyframes rise-straight {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-25vh); opacity: 0; }
        }
        .anim-rise-rotate { animation: rise-rotate linear infinite; }
        @keyframes rise-rotate {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-25vh) rotate(360deg); opacity: 0; }
        }
        .anim-fall-diagonal { animation: fall-diagonal linear infinite; }
        @keyframes fall-diagonal {
            0% { transform: translate(-10vw, 0vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate(15vw, 105vh) rotate(540deg); opacity: 0; }
        }
        #back-btn { 
            position: absolute; bottom: 90px;
            color:#555; background:rgba(255,255,255,0.8); 
            border:1px solid #ddd; padding:12px 40px; 
            border-radius:30px; font-size:0.95rem; cursor:pointer; z-index:100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <div id="auto-play-screen">
        <h2 id="auto-play-title" style="margin-bottom: 30px;">メッセージが届いています</h2>
        <button id="auto-play-btn">お祝いをみる</button>
    </div>

    <div id="setup-screen">
        <div class="container">
            <h2>Celebration Maker</h2>
            <div class="input-group"><label>贈る相手の名前</label><input type="text" id="user-name" placeholder="例：〇〇ちゃん"></div>
            <div class="input-group"><label>メッセージ</label><textarea id="user-text" rows="2">退職おめでとう！</textarea></div>
            <div class="input-group">
                <label>背景（シーン）</label>
                <select id="bg-image-choice">
                    <option value="bg-sakura">🌸 桜吹雪</option>
                    <option value="bg-party">🎉 パーティー</option>
                    <option value="bg-sunset">🌅 夕焼け</option>
                    <option value="bg-cute">🌿 さわやか</option>
                    <option value="bg-sunlight">☀️ 木漏れ日</option>
                </select>
            </div>
            <div class="input-group">
                <label>飾り</label>
                <select id="deco-choice">
                    <option value="sakura">🌸 桜吹雪セット</option>
                    <option value="balloon">🎈 バルーンセット</option>
                    <option value="heart">❤️ ハートセット</option>
                    <option value="kirakira">✨ きらきらパーツ</option>
                    <option value="ribbon">🎀 りぼんパーツ</option>
                    <option value="none">なし</option>
                </select>
            </div>
            <div class="input-group">
                <label>BGMを選択</label>
                <select id="bgm-choice">
                    <option value="お祝いジェネレーター素材/music1.mp3">BGM 1 (明るい)</option>
                    <option value="お祝いジェネレーター素材/music2.mp3">BGM 2 (しっとり)</option>
                    <option value="お祝いジェネレーター素材/music3.mp3">BGM 3 (オルゴール風)</option>
                    <option value="お祝いジェネレーター素材/music4.mp3">BGM 4 (エモーショナル)</option>
                    <option value="お祝いジェネレーター素材/music5.mp3">BGM 5 (ポップかわいい)</option>
                </select>
            </div>
            <div class="btn-area">
                <button id="start-btn">演出を再生する</button>
                <button id="share-btn">このお祝いのリンクを作る</button>
            </div>
        </div>
    </div>

    <div id="celebration-screen">
        <div id="text-container">
            <div id="display-name"></div>
            <div id="display-msg"></div>
        </div>
        <audio id="bgm-player" loop></audio>
        <button id="back-btn">← 作り直す</button>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const shareBtn = document.getElementById('share-btn');
        const backBtn = document.getElementById('back-btn');
        const setupScreen = document.getElementById('setup-screen');
        const celebScreen = document.getElementById('celebration-screen');
        const autoPlayScreen = document.getElementById('auto-play-screen');
        const autoPlayBtn = document.getElementById('auto-play-btn');
        const bgmPlayer = document.getElementById('bgm-player');

        // パーツ設定（バルーン・リボン・ハートを少なめに）
        const decoConfig = {
            sakura:   { images: ['お祝いジェネレーター素材/桜吹雪パーツ1.png', 'お祝いジェネレーター素材/桜吹雪パーツ2.png'], anim: 'anim-fall-diagonal', minSize: 35, maxSize: 55,  interval: 250, burst: 5 },
            balloon:  { images: ['お祝いジェネレーター素材/バルーン1.png', 'お祝いジェネレーター素材/バルーン2.png', 'お祝いジェネレーター素材/バルーン3.png'], anim: 'anim-rise-straight', minSize: 100, maxSize: 150, interval: 700, burst: 2 },
            heart:    { images: ['お祝いジェネレーター素材/ハート1.png', 'お祝いジェネレーター素材/ハート2.png', 'お祝いジェネレーター素材/ハート3.png', 'お祝いジェネレーター素材/ハート4.png'], anim: 'anim-rise-straight', minSize: 70, maxSize: 110, interval: 600, burst: 2 },
            kirakira: { images: ['お祝いジェネレーター素材/きらきらパーツ.png'], anim: 'anim-rise-rotate', minSize: 45, maxSize: 70,  interval: 250, burst: 5 },
            ribbon:   { images: ['お祝いジェネレーター素材/りぼんパーツ.png'], anim: 'anim-rise-rotate', minSize: 60, maxSize: 90,  interval: 600, burst: 2 },
            none:     { images: [], anim: '', minSize: 0, maxSize: 0, interval: 0, burst: 0 }
        };

        let particleInterval;
        let pendingName = '';
        let pendingMsg  = '';
        let pendingBg   = '';
        let pendingDeco = '';
        let pendingBgm  = '';

        // URLパラメータ解析（DOMContentLoaded後に安全に行う）
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('msg')) {
                // パラメータを保存しておく（autoPlayBtn押下時に使う）
                pendingName = decodeURIComponent(urlParams.get('name') || '');
                pendingMsg  = decodeURIComponent(urlParams.get('msg')  || '');
                pendingBg   = decodeURIComponent(urlParams.get('bg_img') || 'bg-sakura');
                pendingDeco = decodeURIComponent(urlParams.get('deco')   || 'sakura');
                pendingBgm  = decodeURIComponent(urlParams.get('bgm')    || 'お祝いジェネレーター素材/music1.mp3');

                const nameStr = pendingName;
                if (nameStr) {
                    document.getElementById('auto-play-title').innerText = `${nameStr}へのお祝いです`;
                } else {
                    document.getElementById('auto-play-title').innerText = 'お祝いメッセージが届いています';
                }
                autoPlayScreen.style.display = 'flex';
            }
        });

        autoPlayBtn.addEventListener('click', () => {
            autoPlayScreen.style.display = 'none';
            runCelebration(pendingName, pendingMsg, pendingBg, pendingDeco, pendingBgm);
        });

        startBtn.addEventListener('click', () => {
            runCelebration(
                document.getElementById('user-name').value,
                document.getElementById('user-text').value,
                document.getElementById('bg-image-choice').value,
                document.getElementById('deco-choice').value,
                document.getElementById('bgm-choice').value
            );
        });

        function runCelebration(name, msg, bgClass, decoKey, bgmFile) {
            setupScreen.style.display = 'none';
            celebScreen.style.display = 'flex';
            celebScreen.className = '';
            celebScreen.classList.add(bgClass);

            const nameEl = document.getElementById('display-name');
            const msgEl  = document.getElementById('display-msg');
            const textContainer = document.getElementById('text-container');

            // アニメーションをリセットして再発火
            textContainer.classList.remove('animate-in');
            void textContainer.offsetWidth; // リフロー強制
            textContainer.classList.add('animate-in');

            nameEl.innerText = name || '';
            msgEl.innerText  = msg  || '';

            // テキスト自動サイズ調整（表示後に実行）
            requestAnimationFrame(() => {
                fitText(nameEl, 'name');
                fitText(msgEl,  'msg');
            });

            bgmPlayer.src = bgmFile;
            bgmPlayer.play().catch(e => console.log('再生不可'));

            const config = decoConfig[decoKey];
            if (config && decoKey !== 'none') {
                for (let i = 0; i < config.burst; i++) {
                    createParticle(decoKey, true);
                }
                particleInterval = setInterval(() => createParticle(decoKey, false), config.interval);
            }
        }

        // テキストを画面幅に収まるよう自動サイズ調整
        function fitText(el, type) {
            const container = document.getElementById('text-container');
            const maxW = container.offsetWidth - 20; // 左右余白

            if (type === 'name') {
                // 名前は1行に収める
                let fs = Math.min(window.innerWidth * 0.09, 48);
                el.style.fontSize = fs + 'px';
                while (el.scrollWidth > maxW && fs > 14) {
                    fs -= 1;
                    el.style.fontSize = fs + 'px';
                }
            } else {
                // メッセージは行数に合わせてサイズ調整
                const lines = (el.innerText.match(/\n/g) || []).length + 1;
                const viewH = window.innerHeight * 0.45; // 画面高さの45%以内
                let fs = Math.min(window.innerWidth * 0.12, 64);
                el.style.fontSize = fs + 'px';
                // 幅チェック
                while (el.scrollWidth > maxW && fs > 14) {
                    fs -= 1;
                    el.style.fontSize = fs + 'px';
                }
                // 高さチェック（複数行の場合）
                while (el.scrollHeight > viewH && fs > 14) {
                    fs -= 1;
                    el.style.fontSize = fs + 'px';
                }
            }
        }

        function createParticle(key, isInitial) {
            const config = decoConfig[key];
            if (!config || config.images.length === 0) return;
            const imgSrc = config.images[Math.floor(Math.random() * config.images.length)];
            const p = document.createElement('div');
            p.classList.add('particle', config.anim);
            p.style.backgroundImage = `url('${imgSrc}')`;
            p.style.left = Math.random() * 100 + 'vw';
            const size = Math.random() * (config.maxSize - config.minSize) + config.minSize;
            p.style.width  = size + 'px';
            p.style.height = size + 'px';
            const duration = Math.random() * 6 + 12;
            p.style.animationDuration = duration + 's';
            if (isInitial) {
                p.style.top = Math.random() * 80 + 10 + 'vh';
                p.style.animationDelay = `-${Math.random() * duration}s`;
            }
            celebScreen.appendChild(p);
            setTimeout(() => p.remove(), duration * 1000);
        }

        shareBtn.addEventListener('click', () => {
            const name   = encodeURIComponent(document.getElementById('user-name').value);
            const msg    = encodeURIComponent(document.getElementById('user-text').value);
            const bg_img = encodeURIComponent(document.getElementById('bg-image-choice').value);
            const deco   = encodeURIComponent(document.getElementById('deco-choice').value);
            const bgm    = encodeURIComponent(document.getElementById('bgm-choice').value);
            const shareUrl = `${window.location.origin}${window.location.pathname}?name=${name}&msg=${msg}&bg_img=${bg_img}&deco=${deco}&bgm=${bgm}`;
            navigator.clipboard.writeText(shareUrl).then(() => alert('このお祝いの専用リンクをコピーしました！'));
        });

        backBtn.addEventListener('click', () => {
            bgmPlayer.pause();
            clearInterval(particleInterval);
            document.getElementById('text-container').classList.remove('animate-in');
            setupScreen.style.display = 'flex';
            celebScreen.style.display = 'none';
            document.querySelectorAll('.particle').forEach(p => p.remove());
        });
    </script>
</body>
</html>
