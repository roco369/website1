<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ぷにぷに！ベジ・パニック</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff0f5; touch-action: none; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; }
        canvas { display: block; }
        
        #ui-container { 
            position: absolute; top: 10px; left: 10px; color: #ff69b4; 
            font-size: 16px; font-weight: bold; pointer-events: none; 
            text-shadow: 1px 1px white; z-index: 20;
        }
        
        .title-text {
            position: absolute; width: 100%; left: 0; top: 20%;
            color: #ff69b4; text-align: center; font-weight: bold;
            font-size: clamp(28px, 9vw, 44px); 
            line-height: 1.3;
            pointer-events: none; z-index: 10; text-shadow: 2px 2px white;
        }

        .btn { 
            position: absolute; padding: 12px 24px; font-size: 18px; 
            font-weight: bold; color: white; background: #ff69b4; 
            border: none; border-radius: 30px; cursor: pointer; 
            box-shadow: 0 4px #d85091; z-index: 100;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px #d85091; }
        
        #muteBtn { top: 10px; right: 10px; width: 44px; height: 44px; padding: 0; font-size: 20px; background: #ffb6c1; border-radius: 50%; }
        #pauseBtn { top: 10px; right: 65px; font-size: 14px; background: #ffb6c1; display: none; }
        
        #startBtn { top: 60%; left: 50%; transform: translate(-50%, -50%); width: 220px; }
        
        .difficulty-btn { left: 50%; transform: translateX(-50%); width: 200px; display: none; }
        #easyBtn { top: 48%; background: #98fb98; box-shadow: 0 4px #6ac46a;}
        #normalBtn { top: 60%; background: #ffd700; box-shadow: 0 4px #b89b00;}
        #hardBtn { top: 72%; background: #ff4500; box-shadow: 0 4px #b33000;}
        
        #retryBtn { top: 65%; left: 50%; transform: translate(-50%, -50%); display: none; width: 200px; }
        #item-timer { color: #ff1493; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div id="ui-container">
        Score: <span id="score">0</span><br>
        High Score: <span id="bestScore">0</span><br>
        <span id="difficulty-display">Course: ---</span><br>
        <span id="item-timer">Power Up: <span id="time-left">0</span>s</span>
    </div>
    
    <div id="titleDisplay" class="title-text">ぷにぷに！<br>ベジ・パニック</div>
    
    <button id="muteBtn" class="btn">🔇</button>
    <button id="pauseBtn" class="btn">PAUSE</button>
    <button id="startBtn" class="btn">START 🐹</button>
    
    <button id="easyBtn" class="difficulty-btn btn">初級 🍅</button>
    <button id="normalBtn" class="difficulty-btn btn">中級 🥬</button>
    <button id="hardBtn" class="difficulty-btn btn">上級 🍄</button>
    <button id="retryBtn" class="btn">もういっかい！</button>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- 音声設定の記憶（ここを強化） ---
        const savedMute = sessionStorage.getItem('isMuted');
        // 初回訪問（保存なし）なら true (ミュート)、保存があればそれに従う
        let isMuted = (savedMute === null) ? true : (savedMute === 'true');

        const ui = {
            score: document.getElementById('score'),
            best: document.getElementById('bestScore'),
            diff: document.getElementById('difficulty-display'),
            timer: document.getElementById('item-timer'),
            timeLeft: document.getElementById('time-left'),
            title: document.getElementById('titleDisplay'),
            mute: document.getElementById('muteBtn')
        };
        
        // アイコン表示の初期化
        ui.mute.innerText = isMuted ? '🔇' : '🔊';

        const buttons = {
            mute: document.getElementById('muteBtn'),
            pause: document.getElementById('pauseBtn'),
            start: document.getElementById('startBtn'),
            easy: document.getElementById('easyBtn'),
            normal: document.getElementById('normalBtn'),
            hard: document.getElementById('hardBtn'),
            retry: document.getElementById('retryBtn')
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function loadImage(src) { const img = new Image(); img.src = src; return img; }
        const img = {
            hamu: loadImage('HAMU.png'), candy: loadImage('CANDY.png'),
            vegetables: ['tamanegi.png','piman.png','ninzin.png','nasu.png','jaga.png'].map(loadImage),
            bosses: { easy: loadImage('tomatoKing.png'), normal: loadImage('letasuKing.png'), hard: loadImage('kinokoKing.png') },
            hana: loadImage('hana.png')
        };

        const bgm = {
            opening: new Audio('opning.mp3'),
            easy: new Audio('Beginner.mp3'),
            normal: new Audio('intermediate.mp3'),
            hard: new Audio('advanced.mp3')
        };
        Object.values(bgm).forEach(audio => { audio.loop = true; audio.volume = 0.5; });

        let currentBgm = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSE(type) {
            if (isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'hit') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'clear') {
                [440, 554, 659, 880].forEach((freq, i) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(freq, now + i * 0.1);
                    g.gain.setValueAtTime(0.1, now + i * 0.1);
                    g.gain.linearRampToValueAtTime(0, now + i * 0.1 + 0.5);
                    o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.5);
                });
            }
        }

        let score = 0;
        let bestScore = localStorage.getItem('bestScore') || 0;
        ui.best.innerText = bestScore;
        let gameState = 'TITLE';
        let currentConfig = null;
        let frame = 0;
        let powerUpTimer = 0;
        const player = { x: canvas.width / 2, y: canvas.height - 100, width: 80, height: 80 };
        const bullets = [], enemies = [], items = [];
        let boss = null;
        
        const decorCandies = Array.from({length: 8}, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            s: 40 + Math.random() * 40, a: Math.random() * Math.PI * 2, sp: 0.02 + Math.random() * 0.02
        }));

        const configs = {
            easy: { name: '初級', enemySpeed: 3, spawnRate: 50, bossHp: 50, bossImg: img.bosses.easy, bossSize: 180, bgm: bgm.easy },
            normal: { name: '中級', enemySpeed: 5, spawnRate: 30, bossHp: 100, bossImg: img.bosses.normal, bossSize: 220, bgm: bgm.normal },
            hard: { name: '上級', enemySpeed: 8, spawnRate: 15, bossHp: 200, bossImg: img.bosses.hard, bossSize: 260, bgm: bgm.hard }
        };

        const handleMove = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
            const clientY = (e.touches ? e.touches[0].clientY : e.clientY);
            player.x = clientX - rect.left;
            player.y = clientY - rect.top - 40;
        };

        function switchBgm(newBgm) {
            if (currentBgm) currentBgm.pause();
            currentBgm = newBgm;
            // ユーザーが一度でも画面を触っていれば再生可能
            if (!isMuted && currentBgm) {
                currentBgm.play().catch(e => console.log("Audio play blocked until interaction"));
            }
        }

        buttons.mute.onclick = (e) => {
            isMuted = !isMuted;
            sessionStorage.setItem('isMuted', isMuted); // 状態を保存
            ui.mute.innerText = isMuted ? '🔇' : '🔊';
            if (isMuted) {
                if (currentBgm) currentBgm.pause();
            } else {
                audioCtx.resume();
                if (currentBgm) currentBgm.play().catch(()=>{});
            }
        };

        buttons.start.onclick = () => {
            audioCtx.resume();
            buttons.start.style.display = 'none';
            buttons.easy.style.display = buttons.normal.style.display = buttons.hard.style.display = 'block';
            switchBgm(bgm.opening);
        };

        function startGame(difficulty) {
            currentConfig = configs[difficulty];
            ui.diff.innerText = `Course: ${currentConfig.name}`;
            buttons.easy.style.display = buttons.normal.style.display = buttons.hard.style.display = 'none';
            buttons.pause.style.display = 'block';
            ui.title.style.display = 'none';
            gameState = 'PLAY';
            switchBgm(currentConfig.bgm);
        }
        buttons.easy.onclick = () => startGame('easy');
        buttons.normal.onclick = () => startGame('normal');
        buttons.hard.onclick = () => startGame('hard');

        buttons.pause.onclick = () => {
            if (gameState === 'PLAY') { gameState = 'PAUSE'; buttons.pause.innerText = 'RESUME'; if(currentBgm) currentBgm.pause(); }
            else { gameState = 'PLAY'; buttons.pause.innerText = 'PAUSE'; if(!isMuted && currentBgm) currentBgm.play(); }
        };
        
        buttons.retry.onclick = () => {
            location.reload(); 
        };

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameState === 'TITLE') {
                decorCandies.forEach(c => {
                    c.y -= 0.5; c.a += c.sp; if(c.y < -c.s) c.y = canvas.height + c.s;
                    ctx.save(); ctx.globalAlpha = 0.2; ctx.translate(c.x + Math.sin(c.a)*20, c.y); ctx.rotate(c.a);
                    ctx.drawImage(img.candy, -c.s/2, -c.s/2, c.s, c.s); ctx.restore();
                });
            } else if (gameState === 'PLAY' || gameState === 'PAUSE') {
                if (gameState === 'PLAY') update();
                draw();
                if (gameState === 'PAUSE') {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            } else {
                drawResult();
            }
            frame++;
            requestAnimationFrame(loop);
        }

        function update() {
            if (powerUpTimer > 0) {
                powerUpTimer--;
                ui.timer.style.display = 'block';
                ui.timeLeft.innerText = Math.ceil(powerUpTimer / 60);
                if (powerUpTimer <= 0) ui.timer.style.display = 'none';
            }
            if (frame % 8 === 0 && isPressing) {
                const b = { x: player.x, y: player.y - 40, width: 30, height: 30 };
                bullets.push({ ...b, vx: 0, vy: -12 });
                if (powerUpTimer > 0) { bullets.push({ ...b, vx: -4, vy: -11 }, { ...b, vx: 4, vy: -11 }); }
            }
            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if (b.y < -30 || b.x < -30 || b.x > canvas.width + 30) bullets.splice(i, 1);
            });
            if (frame % 500 === 0 && Math.random() < 0.6) items.push({ x: Math.random() * (canvas.width - 50) + 25, y: -50, width: 60, height: 60 });
            items.forEach((it, i) => {
                it.y += 2.5; it.x += Math.sin(frame * 0.05) * 3;
                if (Math.hypot(it.x - player.x, it.y - player.y) < 55) { items.splice(i, 1); powerUpTimer = 600; }
            });
            if (score < 1000 && frame % currentConfig.spawnRate === 0) enemies.push({ x: Math.random() * (canvas.width - 40) + 20, y: -50, width: 65, height: 65, img: img.vegetables[Math.floor(Math.random() * 5)] });
            enemies.forEach((e, i) => {
                e.y += currentConfig.enemySpeed;
                if (Math.hypot(e.x - player.x, e.y - player.y) < 55) endGame('GAMEOVER');
                bullets.forEach((b, bi) => {
                    if (Math.hypot(e.x - b.x, e.y - b.y) < 45) { playSE('hit'); enemies.splice(i, 1); bullets.splice(bi, 1); updateScore(10); }
                });
            });
            if (score >= 1000 && !boss) boss = { x: canvas.width/2, y: -150, width: currentConfig.bossSize, height: currentConfig.bossSize, hp: currentConfig.bossHp, maxHp: currentConfig.bossHp, img: currentConfig.bossImg };
            if (boss) {
                if (boss.y < boss.height/2 + 50) boss.y += 1;
                boss.x = canvas.width/2 + Math.sin(frame * 0.04) * (canvas.width/2 - boss.width/2 - 20);
                bullets.forEach((b, bi) => {
                    if (Math.hypot(boss.x - b.x, boss.y - b.y) < boss.width/2 + 20) { playSE('hit'); boss.hp--; bullets.splice(bi, 1); if (boss.hp <= 0) { playSE('clear'); endGame('CLEAR'); } }
                });
            }
        }

        function updateScore(pts) { score += pts; ui.score.innerText = score; if (score > bestScore) { bestScore = score; ui.best.innerText = bestScore; localStorage.setItem('bestScore', bestScore); } }

        function draw() {
            const squish = 1 + Math.sin(frame *
